<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're In — Black Sheep Club Retreat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --yellow:#e8f56a; --black:#0a0a0a; --white:#f5f5f0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--black); color:var(--white);
    font-family:'Barlow',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:40px 24px;
  }
  .wrap { max-width:560px; }
  .check {
    width:72px; height:72px; stroke:var(--yellow); fill:none;
    stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
    margin-bottom:32px;
    stroke-dasharray:200; stroke-dashoffset:200;
    animation: drawCheck 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
  }
  @keyframes drawCheck { to { stroke-dashoffset:0; } }
  h1 {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(56px,14vw,96px);
    line-height:0.9; color:var(--yellow); margin-bottom:20px;
  }
  p {
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600; font-size:clamp(16px,3vw,22px);
    color:#aaa; line-height:1.4; margin-bottom:12px;
  }
  .email { color:var(--yellow); }
  .back {
    display:inline-block; margin-top:36px;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:800; font-size:16px; text-transform:uppercase;
    letter-spacing:1px; color:var(--black); background:var(--yellow);
    padding:14px 28px; border-radius:4px; text-decoration:none;
    transition:transform 0.2s ease;
  }
  .back:hover { transform:translateY(-2px); }
</style>
</head>
<body>
<div class="wrap">
  <svg class="check" viewBox="0 0 72 72">
    <circle cx="36" cy="36" r="32"/>
    <polyline points="22,36 32,46 50,28"/>
  </svg>
  <h1>YOU'RE<br>IN.</h1>
  <p>Your spot is locked. David will be in touch shortly with everything you need to know before May 4th.</p>
  <p class="email">dmausjr88@gmail.com</p>
  <a href="/" class="back">Back to Home</a>
</div>
</body>
</html>
