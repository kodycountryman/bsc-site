<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're On The List — Black Sheep Club</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --yellow:#e8f56a; --black:#0a0a0a; --white:#f5f5f0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--black); color:var(--white);
    font-family:'Barlow',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:40px 24px;
  }
  .wrap { max-width:480px; }
  .icon {
    width:56px; height:56px; stroke:var(--yellow); fill:none;
    stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;
    margin-bottom:28px;
    stroke-dasharray:200; stroke-dashoffset:200;
    animation: draw 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
  }
  @keyframes draw { to { stroke-dashoffset:0; } }
  h1 {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(56px,14vw,88px);
    line-height:0.9; color:var(--yellow); margin-bottom:20px;
  }
  p {
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600; font-size:clamp(16px,3vw,20px);
    color:#888; line-height:1.4; margin-bottom:12px;
  }
  .back {
    display:inline-block; margin-top:32px;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:800; font-size:16px; text-transform:uppercase;
    letter-spacing:1px; color:var(--black); background:var(--yellow);
    padding:13px 28px; border-radius:4px; text-decoration:none;
    transition:transform 0.2s ease;
  }
  .back:hover { transform:translateY(-2px); }
</style>
</head>
<body>
<div class="wrap">
  <svg class="icon" viewBox="0 0 24 24">
    <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.95 12 19.79 19.79 0 01.9 3.38 2 2 0 012.88 1.22h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L7.09 8.91a16 16 0 006 6l1.05-1.05a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
  </svg>
  <h1>YOU'RE<br>ON THE<br>LIST.</h1>
  <p>When the next retreat drops, you'll be the first to know.</p>
  <p style="color:#555;">— David</p>
  <a href="/" class="back">Back to Home</a>
</div>
</body>
</html>
